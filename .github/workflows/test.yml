name: tests

# Runs the offline test suite on every push and PR. Every test uses the mock
# backend or synthetic data — no `claude` CLI, no API key, no audio deps — so the
# suite is fully reproducible on a bare runner.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Run test suite
        run: python -m pytest -q
